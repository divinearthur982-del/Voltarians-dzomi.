<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dzomi Palm Oil Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <h1>Dzomi Palm Oil Store</h1>
  <p>Fresh • Natural • Trusted Ghanaian Palm Oil</p>
</header>

<nav>
  <button onclick="showAdmin()">Admin</button>
  <button onclick="showShop()">Shop</button>
</nav>

<!-- SHOP -->
<section id="shopSection">
  <input id="search" placeholder="Search products..." onkeyup="searchProduct()">
  <div id="products"></div>
</section>

<!-- CHECKOUT -->
<section id="checkout">
  <h2>Checkout</h2>
  <input id="name" placeholder="Your Name">
  <input id="phone" placeholder="Phone Number">
  <button onclick="checkout()">Send via WhatsApp</button>
</section>

<!-- ADMIN -->
<section id="adminSection" style="display:none;">
  <h2>Admin Panel</h2>

  <input id="pname" placeholder="Product Name">
  <input id="pprice" placeholder="Price">
  <input id="pimg" placeholder="Image URL">

  <button onclick="addProduct()">Add Product</button>

  <h3>Current Products</h3>
  <ul id="adminList"></ul>
</section>

<script src="script.js"></script>
</body>
</html>
